name: Downstream Dependabot Trigger

on:
  release:
    types: [published]

concurrency:
  group: downstream-dependabot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CONSUMER_REPOS: |
    microsoft/vscode-isort
    microsoft/vscode-flake8
    microsoft/vscode-pylint
    microsoft/vscode-mypy
    microsoft/vscode-black-formatter

jobs:
  trigger-dependabot:
    name: Trigger Dependabot Updates
    runs-on: ubuntu-latest
    steps:
      - name: Trigger npm and pip updates for each consumer repo
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          DEPENDABOT_DIRECTORY: /
        run: |
          set -euo pipefail

          for repo in $CONSUMER_REPOS; do
            echo "Triggering npm update for $repo"
            gh api "repos/$repo/dependabot/updates" \
              -X POST \
              -f package-ecosystem='npm' \
              -f dependency-name='@vscode/common-python-lsp' \
              -f directory="$DEPENDABOT_DIRECTORY"

            echo "Triggering pip update for $repo"
            gh api "repos/$repo/dependabot/updates" \
              -X POST \
              -f package-ecosystem='pip' \
              -f dependency-name='vscode-common-python-lsp' \
              -f directory="$DEPENDABOT_DIRECTORY"
          done
