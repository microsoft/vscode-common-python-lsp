name: Check PR version
on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'labeled'
      - 'unlabeled'
      - 'synchronize'
permissions:
  pull-requests: read

jobs:
  check-pr-version:
    name: 'Check PR version'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate version consistency
        run: python -m scripts.version.validate
