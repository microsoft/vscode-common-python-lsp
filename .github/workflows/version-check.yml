name: Version Check

on:
  pull_request:
    branches: [main]

jobs:
  version-consistency:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          VERSION_FILE=$(cat VERSION | tr -d '[:space:]')
          PKG_JSON_VERSION=$(node -e "console.log(require('./typescript/package.json').version)")
          PYPROJECT_VERSION=$(python3 -c "
          import re
          content = open('python/pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
          print(m.group(1) if m else 'NOT_FOUND')
          ")

          echo "VERSION file:          $VERSION_FILE"
          echo "package.json version:  $PKG_JSON_VERSION"
          echo "pyproject.toml version: $PYPROJECT_VERSION"

          ERRORS=0

          if [ "$VERSION_FILE" != "$PKG_JSON_VERSION" ]; then
            echo "::error::VERSION ($VERSION_FILE) != package.json ($PKG_JSON_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$VERSION_FILE" != "$PYPROJECT_VERSION" ]; then
            echo "::error::VERSION ($VERSION_FILE) != pyproject.toml ($PYPROJECT_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          # Validate semver format
          if ! echo "$VERSION_FILE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION '$VERSION_FILE' is not valid semver (X.Y.Z)"
            ERRORS=$((ERRORS + 1))
          fi

          # Check CHANGELOG has an entry for this version
          if ! grep -qF "## [$VERSION_FILE]" CHANGELOG.md 2>/dev/null; then
            echo "::warning::CHANGELOG.md has no entry for version $VERSION_FILE"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Fix: run 'python scripts/sync-version.py' to synchronize versions."
            exit 1
          fi

          echo "✅ All versions consistent: $VERSION_FILE"
