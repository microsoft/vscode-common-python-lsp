# Acquires a short-lived AAD token via Managed Identity.
# Sets the pipeline variable 'AzdoToken' (secret) for subsequent steps.
# SEE https://eng.ms/docs/cloud-ai-platform/devdiv/one-engineering-system-1es/1es-docs/1es-security-configuration/configuration-guides/pat-burndown-guidance

parameters:
  # Name of the Azure service connection configured for Managed Identity authentication.
  - name: azureServiceConnection
    type: string

steps:
  - task: AzureCLI@2
    displayName: Acquire AAD token via Managed Identity
    inputs:
      azureSubscription: '${{ parameters.azureServiceConnection }}'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        $token = az account get-access-token --query accessToken --resource 499b84ac-1321-427f-aa17-267ca6975798 -o tsv
        Write-Host "##vso[task.setvariable variable=AzdoToken;issecret=true]$token"
