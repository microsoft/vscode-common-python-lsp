# Acquires an AAD token via Managed Identity and configures pip
# for authenticated access to an Azure Artifacts PyPI feed.
# Supports both Linux (pip.conf) and Windows (pip.ini).

parameters:
  # Name of the Azure service connection configured for Managed Identity authentication.
  - name: azureServiceConnection
    type: string
  # PyPI simple index URL without the https:// prefix (e.g. 'pkgs.dev.azure.com/org/project/_packaging/feed/pypi/simple/').
  - name: feedSimpleUrl
    type: string
  # Target OS — determines whether to write pip.conf (linux) or pip.ini (windows).
  - name: os
    type: string
    default: 'linux'
    values:
      - linux
      - windows

steps:
  - template: acquire-aad-token.yml@self
    parameters:
      azureServiceConnection: ${{ parameters.azureServiceConnection }}

  - ${{ if eq(parameters.os, 'linux') }}:
    - script: |
        mkdir -p "$HOME/.config/pip"
        cat > "$HOME/.config/pip/pip.conf" << EOF
        [global]
        index-url = https://VssSessionToken:${AZDO_TOKEN}@${{ parameters.feedSimpleUrl }}
        EOF
      displayName: Configure pip for Azure Artifacts
      env:
        AZDO_TOKEN: $(AzdoToken)

  - ${{ if eq(parameters.os, 'windows') }}:
    - powershell: |
        New-Item -ItemType Directory -Path "$env:APPDATA\pip" -Force | Out-Null
        @"
        [global]
        index-url = https://VssSessionToken:$env:AZDO_TOKEN@${{ parameters.feedSimpleUrl }}
        "@ | Out-File -FilePath "$env:APPDATA\pip\pip.ini"
      displayName: Configure pip for Azure Artifacts
      env:
        AZDO_TOKEN: $(AzdoToken)
