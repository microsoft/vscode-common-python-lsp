# Azure Pipelines release pipeline for vscode-common-python-lsp.
#
# Triggered by version tags (v*). Validates, tests, and publishes both the
# TypeScript (npm) and Python (PyPI) packages to the Azure DevOps
# msft_consumption feed.
#
# Auth uses Managed Identity — no PATs or stored secrets.

trigger:
  branches:
    include:
      - refs/tags/v*

pr: none

parameters:
  - name: pythonVersions
    type: object
    default: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  - name: operatingSystems
    type: object
    default:
      - name: linux
        image: ubuntu-latest
      - name: windows
        image: windows-latest
      - name: macos
        image: macos-latest

variables:
  - name: NodeVersion
    value: "22.17.0"
  - name: PythonVersion
    value: "3.10"
  # TODO: replace with actual msft_consumption feed GUID
  - name: NpmFeedId
    value: "azure-public/vside/_packaging/msft_consumption/npm/registry/"
  - name: PyPiFeedId
    value: "azure-public/vside/_packaging/msft_consumption/pypi/upload/"

stages:
  # ---------------------------------------------------------------
  # Stage 1: Validate version consistency
  # ---------------------------------------------------------------
  - stage: Validate
    displayName: Validate Release
    jobs:
      - job: VersionCheck
        displayName: Check version consistency
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: python -m scripts.version.validate ${BUILD_SOURCEBRANCH#refs/tags/}
            name: validate
            displayName: Validate tag matches manifests

  # ---------------------------------------------------------------
  # Stage 2: Build artifacts (once) and run tests
  # ---------------------------------------------------------------
  - stage: BuildAndTest
    displayName: Build & Test
    dependsOn: Validate
    variables:
      ReleaseVersion: $[ stageDependencies.Validate.VersionCheck.outputs['validate.ReleaseVersion'] ]
    jobs:
      # --- TypeScript build + test ---
      - job: TypeScript
        displayName: TypeScript build & test
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UseNode@1
            inputs:
              version: $(NodeVersion)
            displayName: Use Node.js $(NodeVersion)

          - script: npm ci
            workingDirectory: typescript
            displayName: Install dependencies

          - script: npm run build
            workingDirectory: typescript
            displayName: Build

          - script: npm run lint
            workingDirectory: typescript
            displayName: Lint

          - script: npm test
            workingDirectory: typescript
            displayName: Test

          - script: npm pack
            workingDirectory: typescript
            displayName: Pack npm tarball

          - publish: $(System.DefaultWorkingDirectory)/typescript/*.tgz
            artifact: npm-package
            displayName: Publish npm artifact

      # --- Python build + test (matrix) ---
      - job: PythonTest
        displayName: Python test (${{ format('{0}', parameters.python) }})
        pool:
          vmImage: ${{ matrix.os }}
        strategy:
          matrix:
            ${{ each os in parameters.operatingSystems }}:
              ${{ each ver in parameters.pythonVersions }}:
                ${{ os.name }}-${{ ver }}:
                  os: ${{ os.image }}
                  python: ${{ ver }}
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(python)
            displayName: Use Python $(python)

          - script: pip install nox
            displayName: Install nox

          - script: nox -s tests
            displayName: Run tests

      # --- Python build (single job, produces dist artifact) ---
      - job: PythonBuild
        displayName: Python build
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(PythonVersion)
            displayName: Use Python $(PythonVersion)

          - script: pip install build
            displayName: Install build tool

          - script: python -m build python/
            displayName: Build sdist and wheel

          - publish: $(System.DefaultWorkingDirectory)/dist
            artifact: python-package
            displayName: Publish Python artifact

  # ---------------------------------------------------------------
  # Stage 3: Publish npm to msft_consumption
  # ---------------------------------------------------------------
  - stage: PublishNpm
    displayName: Publish npm
    dependsOn: BuildAndTest
    jobs:
      - job: Publish
        displayName: Publish to ADO npm feed
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: current
            artifact: npm-package
            displayName: Download npm artifact

          - task: UseNode@1
            inputs:
              version: $(NodeVersion)
            displayName: Use Node.js $(NodeVersion)

          # TODO: set customFeed to the msft_consumption feed GUID
          - task: Npm@1
            displayName: npm publish
            inputs:
              command: custom
              customCommand: publish $(Pipeline.Workspace)/npm-package/*.tgz
              customRegistry: useFeed
              customFeed: $(NpmFeedId)

  # ---------------------------------------------------------------
  # Stage 4: Publish Python to msft_consumption PyPI
  # ---------------------------------------------------------------
  - stage: PublishPyPI
    displayName: Publish PyPI
    dependsOn: PublishNpm
    jobs:
      - job: Publish
        displayName: Publish to ADO PyPI feed
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: current
            artifact: python-package
            displayName: Download Python artifact

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(PythonVersion)
            displayName: Use Python $(PythonVersion)

          - script: pip install twine
            displayName: Install twine

          # TODO: set pythonUploadServiceConnection if using service connection auth
          - task: TwineAuthenticate@1
            displayName: Authenticate with PyPI feed
            inputs:
              artifactFeed: $(PyPiFeedId)

          - script: >
              twine upload
              -r $(PyPiFeedId)
              --config-file $(PYPIRC_PATH)
              $(Pipeline.Workspace)/python-package/*
            displayName: twine upload
