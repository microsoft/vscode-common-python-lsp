# Azure Pipelines release pipeline for vscode-common-python-lsp.
#
# Triggered manually. Validates, tests, publishes both the TypeScript
# (npm) and Python (PyPI) packages to the Azure DevOps
# vscode-common-python-lsp feed, then tags the commit.
#
# Uses MicroBuildTemplate for 1ES compliance (SDL, SBOM, etc).
# Auth uses Managed Identity — no PATs or stored secrets.

trigger: none
pr: none

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/tags/release

parameters:
  - name: pythonVersions
    type: object
    default:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.14"

  - name: publishToConsumptionFeed
    displayName: Publish to msft_consumption feed
    type: boolean
    default: false

variables:
  - name: TeamName
    value: vscode-common-python-lsp
  - name: NodeVersion
    value: "22.21.1"  # Keep in sync with .nvmrc
  - name: PythonVersion
    value: "3.10"
  # Managed Identity service connections for Azure Artifacts auth
  - name: AzureServiceConnectionPush
    value: 'azure-public/vside package push'
  - name: AzureServiceConnectionPull
    value: 'azure-public/vside package pull'
  # npm feed (azure-public/vside)
  - name: NpmFeedUrl
    value: 'https://pkgs.dev.azure.com/azure-public/vside/_packaging/vscode-common-python-lsp/npm/registry/'
  - name: NpmFeedUrlNoProtocol
    value: 'pkgs.dev.azure.com/azure-public/vside/_packaging/vscode-common-python-lsp/npm/registry/'
  # PyPI feed (azure-public/vside)
  - name: PyPiFeedUrl
    value: 'https://pkgs.dev.azure.com/azure-public/vside/_packaging/vscode-common-python-lsp/pypi/upload/'
  - name: PyPiFeedSimpleUrl
    value: 'pkgs.dev.azure.com/azure-public/vside/_packaging/vscode-common-python-lsp/pypi/simple/'
  # Consumption feeds (msft_consumption on azure-public/vside)
  - name: ConsumptionNpmFeedUrl
    value: 'https://pkgs.dev.azure.com/azure-public/vside/_packaging/msft_consumption/npm/registry/'
  - name: ConsumptionNpmFeedUrlNoProtocol
    value: 'pkgs.dev.azure.com/azure-public/vside/_packaging/msft_consumption/npm/registry/'
  - name: ConsumptionPyPiFeedSimpleUrl
    value: 'pkgs.dev.azure.com/azure-public/vside/_packaging/msft_consumption/pypi/simple/'
  # Package names for consumption pull
  - name: NpmPackageName
    value: 'vscode-common-python-lsp'
  - name: PyPiPackageName
    value: 'vscode-common-python-lsp'
  - name: GitHubServiceConnection
    value: "Github - VS Code Common Python LSP" 

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    sdl:
      sourceAnalysisPool: VSEngSS-MicroBuild2022-1ES
      codeSignValidation:
        enabled: true
      sbom:
        enabled: true
    pool:
      name: AzurePipelines-EO
      image: 1ESPT-Ubuntu22.04
      os: linux
    customBuildTags:
      - ES365AIMigrationTooling

    stages:
      # Stage 1: Validate version consistency
      - stage: Validate
        displayName: Validate Release Version
        jobs:
          - job: VersionCheck
            displayName: Check version consistency
            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(PythonVersion)

              - script: python -m scripts.version.validate
                displayName: Validate version consistency

      # Stage 2: Build & Test
      - stage: BuildAndTest
        displayName: Build & Test
        dependsOn: Validate
        condition: not(failed('Validate'))
        jobs:
          # TypeScript
          - job: TypeScript
            displayName: TypeScript build & test
            templateContext:
              outputs:
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/npm-package
                  artifactName: npm-package
            steps:
              - checkout: self

              - task: NodeTool@0
                inputs:
                  versionSpec: $(NodeVersion)

              - template: build/templates/configure-npm-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPull }}
                  feedUrl: $(ConsumptionNpmFeedUrl)
                  feedUrlNoProtocol: $(ConsumptionNpmFeedUrlNoProtocol)
                  projectNpmrcPath: typescript/.npmrc

              - script: npm ci
                workingDirectory: typescript
                displayName: Install dependencies

              - script: npm run build
                workingDirectory: typescript

              - script: npm run lint
                workingDirectory: typescript

              - script: npm test
                workingDirectory: typescript

              - script: |
                  mkdir -p $(Build.ArtifactStagingDirectory)/npm-package
                  npm pack --pack-destination $(Build.ArtifactStagingDirectory)/npm-package
                workingDirectory: typescript

          # Python tests — Linux
          - job: PythonTestLinux
            displayName: Python test (Linux)
            strategy:
              matrix:
                ${{ each ver in parameters.pythonVersions }}:
                  Python_${{ ver }}:
                    pythonVersion: ${{ ver }}
            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(pythonVersion)

              - template: build/templates/configure-pip-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPull }}
                  feedSimpleUrl: $(PyPiFeedSimpleUrl)
                  os: linux

              - script: python -m pip install --upgrade pip nox
                displayName: Install nox

              - script: nox -s tests

          # Python tests — Windows
          - job: PythonTestWindows
            displayName: Python test (Windows)
            pool:
              name: AzurePipelines-EO
              image: 1ESPT-Windows2022
              os: windows
            strategy:
              matrix:
                ${{ each ver in parameters.pythonVersions }}:
                  Python_${{ ver }}:
                    pythonVersion: ${{ ver }}
            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(pythonVersion)

              - template: build/templates/configure-pip-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPull }}
                  feedSimpleUrl: $(PyPiFeedSimpleUrl)
                  os: windows

              - script: python -m pip install --upgrade pip nox
                displayName: Install nox

              - script: nox -s tests

          # Python build
          - job: PythonBuild
            displayName: Python build
            templateContext:
              outputs:
                - output: pipelineArtifact
                  targetPath: $(Build.ArtifactStagingDirectory)/python-package
                  artifactName: python-package
            steps:
              - checkout: self

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(PythonVersion)

              - template: build/templates/configure-pip-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPull }}
                  feedSimpleUrl: $(PyPiFeedSimpleUrl)
                  os: linux

              - script: |
                  pip install build
                  python -m build --outdir $(Build.ArtifactStagingDirectory)/python-package
                workingDirectory: python
                displayName: Build sdist and wheel

      # Stage 3a: Publish npm
      - stage: PublishNpm
        displayName: Publish npm
        dependsOn: BuildAndTest
        jobs:
          - job: Publish
            displayName: Publish to ADO npm feed
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: npm-package
                  targetPath: $(Pipeline.Workspace)/npm-package
            steps:
              - checkout: none

              - task: NodeTool@0
                inputs:
                  versionSpec: $(NodeVersion)
                displayName: Select Node version

              - template: build/templates/configure-npm-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPush }}
                  feedUrl: $(NpmFeedUrl)
                  feedUrlNoProtocol: $(NpmFeedUrlNoProtocol)

              - powershell: |
                  $tgz = Get-ChildItem "$(Pipeline.Workspace)/npm-package/*.tgz" | Select-Object -First 1
                  if (-not $tgz) {
                      Write-Error "No .tgz file found in $(Pipeline.Workspace)/npm-package/"
                      exit 1
                  }
                  Write-Host "Publishing: $($tgz.FullName)"
                  npm publish $tgz.FullName --registry $(NpmFeedUrl) --ignore-scripts
                displayName: npm publish

      # Stage 3b: Publish PyPI
      - stage: PublishPyPI
        displayName: Publish PyPI
        dependsOn: BuildAndTest
        jobs:
          - job: Publish
            displayName: Publish to ADO PyPI feed
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: python-package
                  targetPath: $(Pipeline.Workspace)/python-package
            steps:
              - checkout: none

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(PythonVersion)

              - template: build/templates/configure-pip-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPush }}
                  feedSimpleUrl: $(PyPiFeedSimpleUrl)
                  os: linux

              - script: pip install twine
                displayName: Install twine

              - script: python -m twine upload --repository-url $(PyPiFeedUrl) $(Pipeline.Workspace)/python-package/*.tar.gz $(Pipeline.Workspace)/python-package/*.whl
                displayName: Upload to feed
                env:
                  TWINE_USERNAME: VssSessionToken
                  TWINE_PASSWORD: $(AzdoToken)

      # Stage 4a: Pull npm to msft_consumption
      - stage: PublishConsumptionNpm
        displayName: Pull npm to msft_consumption
        dependsOn: PublishNpm
        condition: and(not(failed()), eq('${{ parameters.publishToConsumptionFeed }}', 'true'))
        jobs:
          - job: PullToConsumption
            displayName: Pull $(NpmPackageName) to msft_consumption
            steps:
              - checkout: none

              - task: NodeTool@0
                inputs:
                  versionSpec: $(NodeVersion)
                displayName: Select Node version

              - template: build/templates/configure-npm-auth.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPush }}
                  feedUrl: $(ConsumptionNpmFeedUrl)
                  feedUrlNoProtocol: $(ConsumptionNpmFeedUrlNoProtocol)

              - script: npm i -g $(NpmPackageName)@latest --registry $(ConsumptionNpmFeedUrl)
                displayName: Pull to msft_consumption

      # Stage 4b: Pull PyPI to msft_consumption
      - stage: PublishConsumptionPyPI
        displayName: Pull PyPI to msft_consumption
        dependsOn: PublishPyPI
        condition: and(not(failed()), eq('${{ parameters.publishToConsumptionFeed }}', 'true'))
        jobs:
          - job: PullToConsumption
            displayName: Pull $(PyPiPackageName) to msft_consumption
            steps:
              - checkout: none

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: $(PythonVersion)

              - template: build/templates/acquire-aad-token.yml@self
                parameters:
                  azureServiceConnection: ${{ variables.AzureServiceConnectionPush }}

              - script: pip install --no-deps $(PyPiPackageName) --index-url https://VssSessionToken:${AZDO_TOKEN}@$(ConsumptionPyPiFeedSimpleUrl)
                displayName: Pull to msft_consumption
                env:
                  AZDO_TOKEN: $(AzdoToken)

      # Stage 5: Create GitHub Release
      - stage: GitHubRelease
        displayName: Create GitHub Release
        dependsOn:
          - PublishNpm
          - PublishPyPI
          - PublishConsumptionNpm
          - PublishConsumptionPyPI
        jobs:
          - job: CreateTag
            displayName: Create git tag
            steps:
              - checkout: self
                persistCredentials: true

              - script: |
                  VERSION=$(cat VERSION)
                  TAG="v${VERSION}"
                  echo "Tagging commit $(Build.SourceVersion) as ${TAG}"
                  git tag "${TAG}" $(Build.SourceVersion)
                  git push origin "${TAG}"
                displayName: Create and push tag

              - script: |
                  VERSION=$(cat VERSION)
                  echo "##vso[task.setvariable variable=ReleaseVersion]${VERSION}"
                displayName: Read version

              - task: GitHubRelease@1
                displayName: Create GitHub Release
                inputs:
                  gitHubConnection: $(GitHubServiceConnection)
                  repositoryName: $(Build.Repository.Name)
                  action: create
                  target: $(Build.SourceVersion)
                  tagSource: userSpecifiedTag
                  tag: v$(ReleaseVersion)
                  title: v$(ReleaseVersion)
                  releaseNotesSource: inline
                  releaseNotesInline: |
                    ## What's Changed
                    Auto-generated release for v$(ReleaseVersion).
                    See [full changelog]($(Build.Repository.Uri)/compare/$(Build.SourceVersion)...v$(ReleaseVersion)) for details.
                  changeLogCompareToRelease: lastFullRelease
                  changeLogType: commitBased
